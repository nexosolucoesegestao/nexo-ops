<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="NEXO OPS — Gestão Inteligente para Varejo Alimentar">

  <!-- Content Security Policy — inclui cdn.jsdelivr.net para Supabase SDK -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://kkjfqltpykkuwshtfhow.supabase.co; connect-src 'self' https://kkjfqltpykkuwshtfhow.supabase.co; worker-src 'self';">

  <title>NEXO OPS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .update-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 10000; background: #C5A35A; color: #0A1628; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transform: translateY(-100%); transition: transform 0.3s ease; }
    .update-banner.show { transform: translateY(0); }
    .update-banner button { background: #0A1628; color: #C5A35A; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body>
  <div id="update-banner" class="update-banner">
    <span>Nova versão disponível!</span>
    <button onclick="location.reload()">Atualizar</button>
  </div>
  <div id="app">
    <div class="loading-state" style="min-height:100vh">
      <div class="spinner"></div>
      <p>Carregando NEXO OPS...</p>
    </div>
  </div>

  <!-- 1. Supabase JS SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 2. Env vars geradas no build — nunca no repo -->
  <script src="env.js"></script>
  <!-- 3. Config + app -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/checkin.js"></script>
  <script src="js/pages/pessoal.js"></script>
  <script src="js/pages/ruptura.js"></script>
  <script src="js/pages/quebra.js"></script>
  <script src="js/pages/temperatura.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/ocorrencias.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(function (reg) {
            setInterval(function () { reg.update(); }, 30 * 60 * 1000);
          })
          .catch(function (err) { console.log('SW error:', err); });
        navigator.serviceWorker.addEventListener('message', function (event) {
          if (event.data && event.data.type === 'NEXO_UPDATE') {
            document.getElementById('update-banner').classList.add('show');
          }
        });
      }
      API.init();
      await Auth.init(); // await necessário — verifica sessão existente no Supabase
      if (Auth.isLoggedIn) {
        Router.navigate('home');
      } else {
        Router.navigate('login');
      }
    });
  </script>
</body>
</html>
