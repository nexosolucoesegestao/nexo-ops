<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="NEXO OPS — Gestão Inteligente para Varejo Alimentar">
  <title>NEXO OPS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .update-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10000;
      background: #C5A35A; color: #0A1628; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      transform: translateY(-100%); transition: transform 0.3s ease;
    }
    .update-banner.show { transform: translateY(0); }
    .update-banner button {
      background: #0A1628; color: #C5A35A; border: none; border-radius: 6px;
      padding: 6px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
  </style>
</head>
<body>
  <div id="update-banner" class="update-banner">
    <span>Nova versão disponível!</span>
    <button onclick="location.reload()">Atualizar</button>
  </div>

  <div id="app">
    <div class="loading-state" style="min-height:100vh">
      <div class="spinner"></div>
      <p>Carregando NEXO OPS...</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/checkin.js"></script>
  <script src="js/pages/pessoal.js"></script>
  <script src="js/pages/ruptura.js"></script>
  <script src="js/pages/quebra.js"></script>
  <script src="js/pages/temperatura.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/ocorrencias.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Registrar Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) {
            // Verifica atualizações a cada 30 min
            setInterval(function() { reg.update(); }, 30 * 60 * 1000);
          })
          .catch(function(err) { console.log('SW error:', err); });

        // Escuta mensagem de atualização do SW
        navigator.serviceWorker.addEventListener('message', function(event) {
          if (event.data && event.data.type === 'NEXO_UPDATE') {
            document.getElementById('update-banner').classList.add('show');
          }
        });
      }

      // Init
      API.init();
      Auth.init();

      if (Auth.isLoggedIn) {
        Router.navigate('home');
      } else {
        Router.navigate('login');
      }
    });
  </script>
</body>
</html>
