<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="NEXO OPS — Gestão Inteligente para Varejo Alimentar">
  <title>NEXO OPS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <div class="loading-state" style="min-height:100vh">
      <div class="spinner"></div>
      <p>Carregando NEXO OPS...</p>
    </div>
  </div>

  <!-- Core (ordem importa) -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>

  <!-- Pages -->
  <script src="js/pages/login.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/checkin.js"></script>
  <script src="js/pages/pessoal.js"></script>
  <script src="js/pages/ruptura.js"></script>
  <script src="js/pages/quebra.js"></script>
  <script src="js/pages/temperatura.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/ocorrencias.js"></script>

  <!-- Boot -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Registrar Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW registered'))
          .catch(err => console.log('SW error:', err));
      }

      // Init sistemas
      API.init();
      Auth.init();

      // Router inicial
      if (Auth.isLoggedIn) {
        Router.navigate('home');
      } else {
        Router.navigate('login');
      }
    });
  </script>
</body>
</html>
